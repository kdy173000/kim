<!-- Pretendard -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

<div class="dilution-calculator">
  <h2 class="calc-title">희석비&nbsp;</h2>

  <div class="calc-body">
    <div class="calc-input">

      <label>희석비</label>
      <div class="ratio-input">
        <span>1 :</span>
        <input type="text" id="waterRatio" placeholder="10" inputmode="decimal">
      </div>

      <label>총 용량</label>
      <div class="unit-input">
        <input type="text" id="totalAmount" placeholder="1000" inputmode="decimal">
        <div class="unit-inside" data-target="totalAmount">
          <button type="button" class="unit-btn active" data-unit="ml">ml</button>
          <button type="button" class="unit-btn" data-unit="L">L</button>
        </div>
      </div>

      <div class="group-divider"></div>

      <label>원액</label>
      <div class="unit-input">
        <input type="text" id="shampooAmount" placeholder="90.91" inputmode="decimal">
        <div class="unit-inside" data-target="shampooAmount">
          <button type="button" class="unit-btn active" data-unit="ml">ml</button>
          <button type="button" class="unit-btn" data-unit="L">L</button>
        </div>
      </div>

      <label>물</label>
      <div class="unit-input">
        <input type="text" id="waterAmount" placeholder="909.09" inputmode="decimal">
        <div class="unit-inside" data-target="waterAmount">
          <button type="button" class="unit-btn active" data-unit="ml">ml</button>
          <button type="button" class="unit-btn" data-unit="L">L</button>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
:root{
  color-scheme: light dark;
  --ui-font: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;

  --calc-border: #d9d9d9;
  --divider: #e5e5e5;
  --text-main: #111111;
  --text-sub: #444444;
  --input-bg: transparent;
  --input-border: #cfcfcf;
  --placeholder: #9a9a9a;
}

@media (prefers-color-scheme: dark){
  :root{
    --calc-border: #6b6b6b;
    --divider: #555555;
    --text-main: #f5f5f5;
    --text-sub: #d6d6d6;
    --input-bg: transparent;
    --input-border: #666666;
    --placeholder: #9b9b9b;
  }
}

.dilution-calculator{
  font-family: var(--ui-font);
  border: 1px solid var(--calc-border);
  border-radius: 14px;
  padding: 30px;
  max-width: 700px;
  margin: auto;
  background: transparent;
  color: var(--text-main);
  box-sizing: border-box;
}

.calc-title{
  text-align: center;
  margin-bottom: 30px;
  font-size: 26px;
  font-weight: 700;
  color: var(--text-main);
}

.calc-body{
  display: flex;
  gap: 40px;
}

.calc-input{
  flex: 1;
}

label{
  display: block;
  color: var(--text-sub);
  font-weight: 500;
  margin-bottom: 4px;
}

.ratio-input{
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.ratio-input span{
  font-size: 18px;
  font-weight: 700;
  color: var(--text-main);
  white-space: nowrap;
}

input{
  width: 100%;
  padding: 10px;
  margin: 0;
  border-radius: 6px;
  border: 1px solid var(--input-border);
  font-size: 16px;
  font-family: var(--ui-font);
  background: var(--input-bg);
  color: var(--text-main);
  box-sizing: border-box;
  outline: none;
}

input::placeholder{
  color: var(--placeholder);
}

input::-webkit-inner-spin-button,
input::-webkit-outer-spin-button{
  -webkit-appearance: none;
  margin: 0;
}

.unit-input{
  position: relative;
  margin-bottom: 10px;
}

.unit-input input{
  padding-right: 86px;
}

.unit-inside{
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  display: inline-flex;
  align-items: center;
  background: transparent;
}

.unit-btn{
  appearance: none;
  border: none;
  background: transparent;
  color: var(--text-sub);
  font-family: var(--ui-font);
  font-size: 13px;
  font-weight: 500;
  padding: 0 8px;
  height: 24px;
  cursor: pointer;
  line-height: 1;
}

.unit-btn + .unit-btn{
  border-left: 1px solid var(--input-border);
}

.unit-btn.active{
  color: var(--text-main);
  font-weight: 700;
}

.group-divider{
  width: 100%;
  height: 1px;
  background: var(--divider);
  margin: 20px 0 20px 0;
}

@media (max-width: 768px){
  .dilution-calculator{
    padding: 17px;
  }

  .calc-title{
    font-size: 25px;
    margin-bottom: 18px;
    margin-top: 0;
  }

  .calc-body{
    flex-direction: column;
    gap: 15px;
  }

  label{
    font-size: 15px;
    margin-bottom: 4px;
  }

  input{
    padding: 8px;
    font-size: 15px;
  }

  .ratio-input{
    gap: 6px;
    margin-bottom: 10px;
  }

  .ratio-input span{
    font-size: 20px;
  }

  .unit-input input{
    padding-right: 76px;
  }

  .unit-btn{
    font-size: 12px;
    padding: 0 7px;
    height: 22px;
  }

  .group-divider{
    margin: 20px 0 12px 0;
  }
}
</style>

<script>
const waterRatioEl = document.getElementById("waterRatio");
const totalAmountEl = document.getElementById("totalAmount");
const shampooAmountEl = document.getElementById("shampooAmount");
const waterAmountEl = document.getElementById("waterAmount");

let isUpdating = false;

const units = {
  totalAmount: "ml",
  shampooAmount: "ml",
  waterAmount: "ml"
};

function parseNumber(value) {
  if (value == null) return NaN;
  const cleaned = String(value).trim().replace(/,/g, ".");
  if (cleaned === "") return NaN;
  return parseFloat(cleaned);
}

function formatNumber(value) {
  if (!isFinite(value)) return "";
  const rounded = Math.round(value * 100) / 100;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(2);
}

function toMl(fieldId, value) {
  if (!isFinite(value)) return NaN;
  return units[fieldId] === "L" ? value * 1000 : value;
}

function fromMl(fieldId, valueMl) {
  if (!isFinite(valueMl)) return NaN;
  return units[fieldId] === "L" ? valueMl / 1000 : valueMl;
}

function clearBottomPair() {
  shampooAmountEl.value = "";
  waterAmountEl.value = "";
}

function clearTopPair() {
  waterRatioEl.value = "";
  totalAmountEl.value = "";
}

function topPairValid() {
  const ratio = parseNumber(waterRatioEl.value);
  const totalRaw = parseNumber(totalAmountEl.value);
  const totalMl = toMl("totalAmount", totalRaw);

  return !isNaN(ratio) && !isNaN(totalMl) && ratio >= 0 && totalMl >= 0;
}

function bottomPairValid() {
  const shampooRaw = parseNumber(shampooAmountEl.value);
  const waterRaw = parseNumber(waterAmountEl.value);
  const shampooMl = toMl("shampooAmount", shampooRaw);
  const waterMl = toMl("waterAmount", waterRaw);

  return !isNaN(shampooMl) && !isNaN(waterMl) && shampooMl > 0 && waterMl >= 0;
}

function calculateFromTopPair() {
  const ratio = parseNumber(waterRatioEl.value);
  const totalMl = toMl("totalAmount", parseNumber(totalAmountEl.value));

  if (isNaN(ratio) || isNaN(totalMl) || ratio < 0 || totalMl < 0) return;

  const shampooMl = totalMl / (1 + ratio);
  const waterMl = totalMl - shampooMl;

  isUpdating = true;
  shampooAmountEl.value = formatNumber(fromMl("shampooAmount", shampooMl));
  waterAmountEl.value = formatNumber(fromMl("waterAmount", waterMl));
  isUpdating = false;
}

function calculateFromBottomPair() {
  const shampooMl = toMl("shampooAmount", parseNumber(shampooAmountEl.value));
  const waterMl = toMl("waterAmount", parseNumber(waterAmountEl.value));

  if (isNaN(shampooMl) || isNaN(waterMl) || shampooMl <= 0 || waterMl < 0) return;

  const ratio = waterMl / shampooMl;
  const totalMl = shampooMl + waterMl;

  isUpdating = true;
  waterRatioEl.value = formatNumber(ratio);
  totalAmountEl.value = formatNumber(fromMl("totalAmount", totalMl));
  isUpdating = false;
}

waterRatioEl.addEventListener("input", () => {
  if (isUpdating) return;

  isUpdating = true;
  clearBottomPair();
  isUpdating = false;

  if (topPairValid()) {
    calculateFromTopPair();
  }
});

totalAmountEl.addEventListener("input", () => {
  if (isUpdating) return;

  isUpdating = true;
  clearBottomPair();
  isUpdating = false;

  if (topPairValid()) {
    calculateFromTopPair();
  }
});

shampooAmountEl.addEventListener("input", () => {
  if (isUpdating) return;

  isUpdating = true;
  clearTopPair();
  isUpdating = false;

  if (bottomPairValid()) {
    calculateFromBottomPair();
  }
});

waterAmountEl.addEventListener("input", () => {
  if (isUpdating) return;

  isUpdating = true;
  clearTopPair();
  isUpdating = false;

  if (bottomPairValid()) {
    calculateFromBottomPair();
  }
});

document.querySelectorAll(".unit-inside").forEach(toggle => {
  const targetId = toggle.dataset.target;
  const inputEl = document.getElementById(targetId);

  toggle.querySelectorAll(".unit-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const newUnit = btn.dataset.unit;
      const oldUnit = units[targetId];
      if (newUnit === oldUnit) return;

      const currentValue = parseNumber(inputEl.value);

      if (!isNaN(currentValue)) {
        const valueMl = oldUnit === "L" ? currentValue * 1000 : currentValue;
        const converted = newUnit === "L" ? valueMl / 1000 : valueMl;
        inputEl.value = formatNumber(converted);
      }

      units[targetId] = newUnit;

      toggle.querySelectorAll(".unit-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      if (isUpdating) return;

      if (targetId === "totalAmount") {
        isUpdating = true;
        clearBottomPair();
        isUpdating = false;

        if (topPairValid()) {
          calculateFromTopPair();
        }
      }

      if (targetId === "shampooAmount" || targetId === "waterAmount") {
        isUpdating = true;
        clearTopPair();
        isUpdating = false;

        if (bottomPairValid()) {
          calculateFromBottomPair();
        }
      }
    });
  });
});
</script>
