<!-- Pretendard -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

<div class="dilution-calculator">

  <h2 class="calc-title">희석비 계산기&nbsp;</h2>

  <div class="calc-body">

    <div class="calc-input">
      <label>희석비</label>
      <div class="ratio-input">
        <span>1:</span>
        <input type="text" id="waterRatio" placeholder="10" inputmode="numeric">
      </div>

      <label>총 용량 (ml)</label>
      <input type="text" id="totalAmount" placeholder="1000" inputmode="numeric">
    </div>

    <div class="result">
      <p class="result-label">원액</p>
      <div class="result-value">
        <span id="shampooAmount">0</span> ml
      </div>

      <p class="result-label">물</p>
      <div class="result-value">
        <span id="waterAmount">0</span> ml
      </div>
    </div>

  </div>
</div>

<script>
function calculateDilution() {
  const waterRatio = parseFloat(document.getElementById("waterRatio").value);
  const total = parseFloat(document.getElementById("totalAmount").value);

  if (isNaN(waterRatio) || isNaN(total)) {
    document.getElementById("shampooAmount").innerText = "0";
    document.getElementById("waterAmount").innerText = "0";
    return;
  }

  const shampooRatio = 1;
  const totalParts = shampooRatio + waterRatio;

  const shampooAmount = (total * shampooRatio) / totalParts;
  const waterAmount = (total * waterRatio) / totalParts;

  document.getElementById("shampooAmount").innerText = shampooAmount.toFixed(2);
  document.getElementById("waterAmount").innerText = waterAmount.toFixed(2);
}

document.getElementById("waterRatio").addEventListener("input", calculateDilution);
document.getElementById("totalAmount").addEventListener("input", calculateDilution);
</script>

<style>

input{

  background: var(--input-bg);

/* RESULT */
.result{

</style>
